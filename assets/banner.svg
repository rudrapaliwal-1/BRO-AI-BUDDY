<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5f5f5;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="400" fill="url(#bgGradient)"/>
  
  <!-- Accent bars -->
  <rect x="0" y="0" width="1200" height="8" fill="#8dc63f"/>
  <rect x="0" y="392" width="1200" height="8" fill="#0d2137"/>
  
  <!-- Left circle accent -->
  <circle cx="100" cy="100" r="80" fill="#8dc63f" opacity="0.1"/>
  
  <!-- Right circle accent -->
  <circle cx="1100" cy="300" r="120" fill="#0d2137" opacity="0.05"/>
  
  <!-- Robot/AI icon (simple geometric design) -->
  <g transform="translate(200, 100)">
    <!-- Head -->
    <rect x="0" y="0" width="120" height="130" rx="15" fill="none" stroke="#0d2137" stroke-width="4"/>
    
    <!-- Eyes -->
    <circle cx="30" cy="40" r="12" fill="#8dc63f"/>
    <circle cx="90" cy="40" r="12" fill="#8dc63f"/>
    
    <!-- Smile -->
    <path d="M 35 80 Q 60 95 85 80" stroke="#0d2137" stroke-width="4" fill="none" stroke-linecap="round"/>
    
    <!-- Antenna -->
    <line x1="60" y1="0" x2="60" y2="-30" stroke="#8dc63f" stroke-width="4" stroke-linecap="round"/>
    <circle cx="60" cy="-35" r="6" fill="#8dc63f"/>
  </g>
  
  <!-- Main Text -->
  <text x="400" y="140" font-family="'Barlow Condensed', Arial, sans-serif" font-size="72" font-weight="900" fill="#0d2137" letter-spacing="-2">
    🤖 Bro
  </text>
  
  <!-- Subtitle -->
  <text x="400" y="200" font-family="'Barlow', Arial, sans-serif" font-size="28" font-weight="600" fill="#0d2137" letter-spacing="0.5">
    Free AI Buddy
  </text>
  
  <!-- Tagline -->
  <text x="400" y="250" font-family="'Barlow', Arial, sans-serif" font-size="18" font-weight="400" fill="#555555">
    Online with Gemini • Offline in Browser • Forever Free
  </text>
  
  <!-- Feature pills -->
  <g>
    <!-- Pill 1 -->
    <rect x="400" y="290" width="160" height="40" rx="20" fill="none" stroke="#8dc63f" stroke-width="2"/>
    <text x="490" y="318" font-family="'Barlow', Arial, sans-serif" font-size="14" font-weight="600" fill="#8dc63f" text-anchor="middle">
      💬 AI Chat
    </text>
    
    <!-- Pill 2 -->
    <rect x="590" y="290" width="160" height="40" rx="20" fill="none" stroke="#8dc63f" stroke-width="2"/>
    <text x="670" y="318" font-family="'Barlow', Arial, sans-serif" font-size="14" font-weight="600" fill="#8dc63f" text-anchor="middle">
      🔒 Private
    </text>
    
    <!-- Pill 3 -->
    <rect x="780" y="290" width="160" height="40" rx="20" fill="none" stroke="#8dc63f" stroke-width="2"/>
    <text x="860" y="318" font-family="'Barlow', Arial, sans-serif" font-size="14" font-weight="600" fill="#8dc63f" text-anchor="middle">
      📴 Offline
    </text>
  </g>
  
  <!-- Accent line -->
  <line x1="400" y1="360" x2="1000" y2="360" stroke="#8dc63f" stroke-width="3" stroke-linecap="round"/>
</svg>